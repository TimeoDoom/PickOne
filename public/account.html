    <style>
      @keyframes eyeBlink {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.2);
          opacity: 0.8;
        }
      }

      .eye-icon {
        transition: all 0.3s ease;
      }

      .eye-icon.visible {
        color: #7c5cff;
      }

      .eye-icon.hidden {
        color: #94a3b8;
      }

      .password-toggle.visible .eye-icon {
        animation: eyeBlink 0.5s ease;
      }
    </style>
  </head>

    <!-- Menu mobile -->
    <div class="mobile-menu">
      <div class="mobile-menu-content">
        <div class="mobile-menu-header">
          <h2>Menu</h2>

        <!-- Navigation Links -->

        <!-- Action Buttons -->
        <div class="mobile-menu-actions">
          <button
            class="mobile-add-bet add-bet"
            style="
              display: block;
              width: 100%;
              padding: 14px 20px;
              background: linear-gradient(135deg, #7c5cff, #00d4a8);

    <main class="account">
      <div class="account-info">
        <div class="profile-container">
          <!-- <img
            src="./imgs/profile.webp"
            alt="Photo de profil"

          />

        </div>
        <div class="profile-details">
          <h1 class="user-name"></h1>
          <div class="stats">
            <div class="stat-item">
              <span class="stat-value nb-bet"></span>
              <span class="stat-label">Paris</span>
            </div>
            <div class="stat-item">
              <span class="stat-value won-bet">18</span>
              <span class="stat-label">Gagnés</span>
            </div>
            <div class="stat-item">
              <span class="stat-value ratio"></span>
              <span class="stat-label">Ratio</span>
            </div>
          </div>
        </div>
      </div>

      <div class="account-sections">
        <div class="section-card">
          <h2 class="section-title">Informations personnelles</h2>
          <div class="form-grid">
            <div class="input-group">
              <label for="email">Adresse email</label>
              <input type="email" id="email" disabled />
            </div>
            <div class="input-group">
              <label for="username">Nom d'utilisateur</label>
              <input type="text" id="username" disabled />
            </div>
          </div>
          <div class="btn-container">
            <button class="button cancel" style="display: none">Annuler</button>
            <button class="button save-button" style="display: none">
              Sauvegarder
            </button>
            <button class="button edit-button">Modifier</button>
            <button class="button edit-pwd-button">
              Modifier mon mot de passe
            </button>
          </div>
        </div>

        <div class="btn-container">
          <button
            class="button logout-button"
            style="background-color: #ef4444; border-color: #ef4444"
          >
            Se déconnecter
          </button>
        </div>
      </div>
    </main>

    <!-- Modal pour modifier le mot de passe -->
    <div id="pwd-modal" class="modal">
      <div class="modal-content">
        <h2>Modifier mon mot de passe</h2>
        <div id="pwd-message" class="modal-message"></div>

        <div class="input-group">
          <label for="current-password">Mot de passe actuel</label>
          <div class="password-input">
            <input type="password" id="current-password" />
            <button
              type="button"
              class="password-toggle"
              data-target="current-password"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="eye-icon hidden"
              >
                <path
                  d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"
                />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>
        <div class="input-group">
          <label for="new-password">Nouveau mot de passe</label>
          <div class="password-input">
            <input type="password" id="new-password" />
            <button
              type="button"
              class="password-toggle"
              data-target="new-password"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="eye-icon hidden"
              >
                <path
                  d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"
                />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
          <div class="input-hint">
            Minimum 8 caractères avec chiffres et lettres
          </div>
        </div>
        <div class="input-group">
          <label for="confirm-password"
            >Confirmer le nouveau mot de passe</label
          >
          <div class="password-input">
            <input type="password" id="confirm-password" />
            <button
              type="button"
              class="password-toggle"
              data-target="confirm-password"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="eye-icon hidden"
              >
                <path
                  d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"
                />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>
        <div class="modal-buttons">
          <button class="button cancel-modal">Annuler</button>
          <button class="button save-password">
            <span class="button-text">Enregistrer</span>
            <span class="button-loading" style="display: none">...</span>
          </button>
        </div>
      </div>
    </div>
